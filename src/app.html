<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1, viewport-fit=cover" />
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#253980" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="apple-touch-icon" href="/apple-icon-180.png" />
		%sveltekit.head%
		<script type="text/javascript" src="https://cdn.geolonia.com/v1/embed?geolonia-api-key=YOUR-API-KEY"></script>
		<style>
			#splash {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				z-index: 99999;
				transition: opacity 0.5s ease;
			}
			#splash.fade-out {
				opacity: 0;
				pointer-events: none;
			}
			#splash img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}
			#splash .splash-spinner {
				position: absolute;
				bottom: 48px;
				left: 50%;
				transform: translateX(-50%);
				width: 32px;
				height: 32px;
				border: 3px solid rgba(255,255,255,0.3);
				border-top-color: #253980;
				border-radius: 50%;
				animation: splash-spin 0.7s linear infinite;
			}
			@keyframes splash-spin {
				to { transform: rotate(360deg); }
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="splash">
			<img src="/splash_1.webp" alt="SHIZUOKA CRAFT BEER MAP" />
			<div class="splash-spinner"></div>
		</div>
		<script>
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.register('/sw.js');
			}
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
